<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSE Debug - LIDFE Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: #4CAF50;
            margin-bottom: 20px;
        }
        
        .controls {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        input {
            flex: 1;
            min-width: 200px;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 4px;
            color: #e0e0e0;
        }
        
        button {
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        
        button:hover {
            background: #45a049;
        }
        
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        
        .status {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .status-item {
            margin: 5px 0;
        }
        
        .status-connected {
            color: #4CAF50;
        }
        
        .status-disconnected {
            color: #f44336;
        }
        
        .events {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            max-height: 600px;
            overflow-y: auto;
        }
        
        .event {
            background: #1a1a1a;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 4px;
            border-left: 3px solid #4CAF50;
        }
        
        .event-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 12px;
            color: #888;
        }
        
        .event-content {
            background: #0a0a0a;
            padding: 10px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            overflow-x: auto;
        }
        
        .test-section {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
        
        textarea {
            width: 100%;
            min-height: 100px;
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 4px;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 SSE Debug - LIDFE Chat</h1>
        
        <div class="controls">
            <div class="input-group">
                <input type="text" id="user_id" placeholder="User ID (UUID)" value="">
                <input type="text" id="thread_id" placeholder="Thread ID" value="">
                <button id="connect-btn" onclick="connect()">Conectar</button>
                <button id="disconnect-btn" onclick="disconnect()" disabled>Desconectar</button>
            </div>
        </div>
        
        <div class="status">
            <div class="status-item">
                <strong>Status:</strong> 
                <span id="connection-status" class="status-disconnected">Desconectado</span>
            </div>
            <div class="status-item">
                <strong>Eventos recebidos:</strong> 
                <span id="event-count">0</span>
            </div>
            <div class="status-item">
                <strong>Última atualização:</strong> 
                <span id="last-update">-</span>
            </div>
        </div>
        
        <div class="events">
            <h2>📨 Eventos Recebidos</h2>
            <div id="event-list"></div>
        </div>
        
        <div class="test-section">
            <h2>🧪 Enviar Mensagem de Teste</h2>
            <textarea id="test-message" placeholder='{"message": "Mensagem de teste", "role": "assistant", "type": "text"}'></textarea>
            <button onclick="sendTestMessage()">Enviar Teste</button>
        </div>
    </div>
    
    <script src="debug.js"></script>
</body>
</html>
